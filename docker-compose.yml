version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: userapp-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - userapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: userapp-api
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - userapp-network
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: userapp-web
    ports:
      - "8080:8080"
    depends_on:
      - api
    networks:
      - userapp-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  userapp-network:
    driver: bridge
